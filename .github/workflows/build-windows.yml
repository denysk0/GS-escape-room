name: Build Windows EXE

# Builds the Escape Room as a Windows standalone on a self-hosted Windows runner
# (machine "denyak"). The Gaussian Splatting DXC/D3D compute shaders only compile
# from the Windows editor, and the free Unity Personal license is bound to this
# machine / the aladi user session, so a self-hosted runner is the only way to
# produce a correct build on the free tier. Unity 2022.3.47f1 is pre-installed via
# the Hub; the runner service runs as the aladi account so Unity's per-user
# licensing client is reachable. The build is wrapped into a single Inno Setup
# installer (with uninstaller) and attached to a Release.

on:
  push:
    tags:
      - 'v*'          # build + release on version tags, e.g. v1.0.0
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write      # needed to attach the installer to a GitHub Release

jobs:
  build:
    name: Build Windows64
    runs-on: [self-hosted, windows, unity2022]
    timeout-minutes: 120
    env:
      UNITY: 'C:\Program Files\Unity\Hub\Editor\2022.3.47f1\Editor\Unity.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false   # keep the imported Library between runs (faster, reliable)

      - name: Build (Unity, pre-activated local license)
        shell: powershell
        run: |
          # Unity.exe is a GUI-subsystem app: invoking it with `&` and logging to a
          # file (not stdout) does not block reliably and leaves $LASTEXITCODE empty.
          # Start-Process -Wait -PassThru waits properly and returns the real ExitCode.
          $log = Join-Path $env:GITHUB_WORKSPACE 'unity_build.log'
          if (Test-Path $log) { Remove-Item $log -Force }
          $unityArgs = @(
            '-batchmode','-nographics','-quit',
            '-projectPath', "$env:GITHUB_WORKSPACE",
            '-buildTarget','Win64',
            '-executeMethod','CIBuild.BuildWindows',
            '-logFile', "$log"
          )
          $p = Start-Process -FilePath "$env:UNITY" -ArgumentList $unityArgs -Wait -PassThru -NoNewWindow
          $code = $p.ExitCode
          if (Test-Path $log) { Get-Content $log }
          Write-Host "Unity exit code: $code"
          if ($code -ne 0) { Write-Error "Unity build failed ($code)"; exit $code }

      - name: Build installer (Inno Setup)
        shell: powershell
        run: |
          # winget installs Inno Setup per-user under %LOCALAPPDATA%; fall back to the
          # machine-wide Program Files location too.
          $iscc = @(
            (Join-Path $env:LOCALAPPDATA 'Programs\Inno Setup 6\ISCC.exe'),
            'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { Write-Error 'ISCC.exe not found'; exit 1 }
          & "$iscc" /DSourceDir=build installer.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC failed ($LASTEXITCODE)"; exit $LASTEXITCODE }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EscapeRoom-Installer
          path: Output/*.exe

      - name: Attach installer to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/*.exe
