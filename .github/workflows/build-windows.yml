name: Build Windows EXE

# Builds the Escape Room as a Windows standalone on a Windows runner so the
# Gaussian Splatting DXC/D3D compute shaders compile correctly (game-ci's
# Linux builder can't target DXC). Then wraps the build into a single Inno
# Setup installer (with uninstaller) and attaches it to a GitHub Release.

on:
  push:
    tags:
      - 'v*'          # build + release on version tags, e.g. v1.0.0
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  build:
    name: Build Windows64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Win64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Win64-

      - name: Setup Unity
        uses: kuler90/setup-unity@v1
        with:
          unity-version: 2022.3.47f1

      - name: Activate Unity
        uses: kuler90/activate-unity@v1
        with:
          unity-username: ${{ secrets.UNITY_EMAIL }}
          unity-password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build Unity (Windows64)
        uses: kuler90/build-unity@v1
        with:
          build-target: Win64
          build-path: build/EscapeRoom.exe

      - name: Build installer (Inno Setup)
        run: iscc /DSourceDir=build installer.iss
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EscapeRoom-Installer
          path: Output/*.exe

      - name: Attach installer to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/*.exe
